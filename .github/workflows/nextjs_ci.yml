name: Next.js CI/CD Quality Assurance

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: '20'
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Run ESLint Checks
      run: npm run lint

    - name: Build Next.js Production App
      run: npm run build
      env:
        DISABLE_HMR: 'true'
        NEXT_TELEMETRY_DISABLED: '1'
        GEMINI_API_KEY: 'mock_key_for_build_checks'
